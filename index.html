<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScubeScripts</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #2b2b2b;
        }
        .header {
            width: 100%;
            background-color: #1b1b1b;
            color: white;
            padding: 10px 0;
        }
        .header-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 70%;
            margin: 0 auto;
        }
        .logo {
            display: flex;
            align-items: center;
        }
        .logo img {
            height: 40px;
            margin-right: 10px;
            border-radius: 15%;
        }
        .logotext {
            font-size: 24px;
            font-weight: bold;
        }
        .navbar ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
        }
        .navbar li {
            margin: 0 15px;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .navbar a:hover {
            background-image: linear-gradient(120deg, #fccb90 0%, #d57eeb 100%);
            color: black; /* Farbe des Textes bei Hover ändern */
        }
        .social-media a {
            color: white;
            text-decoration: none;
            margin-left: 10px;
            font-size: 20px;
            transition: color 0.3s ease;
        }
        .social-media a:hover {
            color: white;
        }
        .social-media a:hover .fab.fa-discord {
            color: #7289da;
        }
        .social-media a:hover .fab.fa-github {
            color: #BC86E0;
        }
        .under-construction {
            text-align: center;
            background-color: #252525;
            color: white;
            padding: 30px 0;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-wrapper">
            <div class="logo">
                <img src="logo.png" alt="Logo">
                <div class="logotext">Scube Scripts</div>
            </div>
            <nav class="navbar">
                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="#docs">Docs</a></li>
                    <li><a href="#projects">Projects</a></li>
                    <li><a href="#support">Support Us</a></li>
                </ul>
            </nav>
            <div class="social-media">
                <a href="https://discord.gg/Mqgewse3Yc" target="_blank"><i class="fab fa-discord"></i></a>
                <a href="https://github.com/ScubeScripts" target="_blank"><i class="fab fa-github"></i></a>
            </div>
        </div>
    </header>

    <div class="under-construction">
        Site under construction
    </div>

</body>
</html>
