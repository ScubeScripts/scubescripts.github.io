<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScubeScripts</title>
  <link rel="icon" href="scube.ico" type="image/x-icon">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Open Sans', sans-serif;
      background-color: #282828;
      margin: 0;
      padding: 0;
    }
    a {
      text-decoration: none;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .container {
      padding-left: 15px;
      padding-right: 15px;
      margin-left: auto;
      margin-right: auto;
    }
    @media (min-width: 768px) {
      .container {
        width: 750px;
      }
    }
    @media (min-width: 992px) {
      .container {
        width: 970px;
      }
    }
    @media (min-width: 1200px) {
      .container {
        width: 1170px;
      }
    }
    .landing-page header {
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #404040;
      padding: 0 15px;
      gap: 30px;
      position: relative; /* Macht die Positionierung für das Dropdown-Menü möglich */
    }
    .landing-page header .logo {
      color: #6c63ff;
      font-style: italic;
      text-transform: uppercase;
      font-size: 20px;
    }
    .menu-toggle {
      display: none;
      font-size: 24px;
      cursor: pointer;
      color: #6c63ff;
    }
    .landing-page header .links {
      display: flex;
      align-items: center;
    }
    .landing-page header .links li {
      margin-left: 30px;
      cursor: pointer;
      transition: .3s;
    }
    .landing-page header .links a {
      color: #ffffff;
      transition: color 0.3s;
    }
    .landing-page header .links a:hover {
      color: #6c63ff;
      text-shadow: 0 0 8px rgba(108, 99, 255, 0.6);
    }
    .landing-page header .links li:last-child a {
      color: #FFF;
    }
    .landing-page header .links li:last-child {
      background-color: #6c63ff;
      padding: 10px 20px;
      border-radius: 20px;
    }
    @media (max-width: 767px) {
      .menu-toggle {
        display: block;
        font-size: 24px;
        cursor: pointer;
        color: #6c63ff;
        margin-left: auto; /* Sorgt dafür, dass das Menü rechts ausgerichtet ist */
        padding-left: 5%; /* Fügt einen Abstand zwischen dem Logo und dem Dropdown-Menü hinzu */
      }
      .landing-page header .links {
        display: none;
        flex-direction: column;
        gap: 10px;
        background-color: #404040;
        width: 100%;
        padding: 15px;
        position: absolute;
        top: 80px; /* Position direkt unterhalb der Navbar */
        left: 0;
        z-index: 1;
      }
      .landing-page header .links.show {
        display: flex;
      }
    }
    .landing-page .content .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 140px;
      min-height: calc(100vh - 80px);
    }
    @media (max-width: 767px) {
      .landing-page .content .container {
        gap: 20px;
        padding: 20px;
        min-height: calc(100vh - 101px);
        justify-content: center;
        flex-direction: column-reverse;
        text-align: center;
      }
    }
    .landing-page .content .info h1 {
      color: #ffffff;
      font-size: 44px;
    }
    @media (max-width: 767px) {
      .landing-page .content .info h1 {
        font-size: 32px;
      }
    }
    .landing-page .content .info p {
      margin: 0;
      line-height: 1.6;
      font-size: 15px;
      color: #ffffff;
    }
    @media (max-width: 767px) {
      .landing-page .content .info p {
        font-size: 16px;
      }
    }
    .landing-page .content .info button {
      border: 0;
      border-radius: 20px;
      padding: 12px 30px;
      margin-top: 30px;
      cursor: pointer;
      color: #FFF;
      background-color: #6c63ff;
    }
    @media (max-width: 767px) {
      .landing-page .content .info button {
        padding: 10px 20px;
        font-size: 16px;
      }
    }
    .landing-page .content .image img {
      max-width: 100%;
      border-radius: 25px;
    }
    @media (max-width: 767px) {
      .landing-page .content .image img {
        max-width: 90%;
        margin-top: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="landing-page">
    <header>
      <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
        <a href="#" class="logo">Scube <b>Scripts</b></a>
        <span class="menu-toggle" onclick="toggleMenu()">☰</span>
        <ul class="links" id="navLinks">
          <li><a href="#home">Home</a></li>
          <li><a href="#about">About Us</a></li>
          <li><a href="#docs">Docs</a></li>
          <li><a href="#projects">Projects</a></li>
          <li><a href="https://github.com/ScubeScripts" target="_blank">GitHub</a></li>
        </ul>
      </div>
    </header>
    <div class="content">
      <div class="container">
        <div class="info">
          <h1>Site under construction</h1>
          <p>Hello, my site is currently still under construction, but you can also find everything important on my Discord.</p>
          <a href="https://discord.gg/Mqgewse3Yc" target="_blank">
            <button>My Discord Server</button>
          </a>
        </div>
        <div class="image">
          <img src="bg.png">
        </div>
      </div>
    </div>
  </div>
  <script>
    function toggleMenu() {
      document.getElementById("navLinks").classList.toggle("show");
    }
  </script>
</body>
</html>
